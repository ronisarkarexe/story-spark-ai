name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native bindings for current platform
        run: pnpm rebuild

      - name: Typecheck backend
        run: pnpm run build -w story-spark-ai-backend

      - name: Typecheck frontend
        run: pnpm exec -w story-spark-ai-frontend -- tsc -b --noEmit
