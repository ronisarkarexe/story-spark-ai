name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native bindings for current platform
        run: pnpm rebuild

      - name: Typecheck backend
        run: pnpm --filter story-spark-ai-backend build

      - name: Typecheck frontend
        run: pnpm --filter story-spark-ai-frontend exec tsc -b --noEmit
