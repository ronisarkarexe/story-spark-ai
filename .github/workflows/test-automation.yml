name: Automated Test Generation & PR Agent

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test-agent:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
      - name: Checkout Code from Fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Run Test Agent Pipeline
        run: |
          # 1. Scan for the top 2 untested files
          echo "Scanning for untested files..."
          TARGETS=$(npx tsx scripts/coverage-scanner.ts)
          echo "Top untested files: $TARGETS"

          # Parse JSON array using jq and loop (limit to max 2 files)
          COUNT=0
          for FILE in $(echo "$TARGETS" | jq -r '.[]'); do
            if [ $COUNT -ge 2 ]; then
              echo "Reached maximum run limit of 2 targets. Stopping."
              break
            fi
            COUNT=$((COUNT+1))

            echo ""
            echo "=================================================="
            echo "Processing Target File: $FILE"
            echo "=================================================="

            # Make sure we start from a clean main branch
            git checkout main
            git reset --hard origin/main

            # Construct structured issue body matching improvement.yml template
            ISSUE_BODY=$(cat <<EOF
### Is there an existing issue for this?

- [x] I have searched the existing issues

### What would you like to improve?

Add robust TypeScript unit tests for the file \`$FILE\` to cover core logic, edge cases, and ensure type-safety.

### Why does this matter?

Adding tests ensures regression protection, improves code quality, and helps verify implementation details automatically.

### Record

- [x] I agree to follow this project's Code of Conduct
- [x] I want to work on this issue
EOF
)

            # Create the upstream issue
            echo "Creating issue on upstream repo ronisarkarexe/story-spark-ai..."
            ISSUE_URL=$(gh issue create \
              --repo ronisarkarexe/story-spark-ai \
              --title "Improve: Add tests for $FILE" \
              --body "$ISSUE_BODY" \
              --label "Improvement" \
              --label "Needs Triage")
            
            # Extract issue number
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE "[0-9]+$")
            echo "Created Issue Number: $ISSUE_NUMBER ($ISSUE_URL)"

            # Assign to ourselves upstream (by commenting /assign)
            echo "Assigning issue via comment..."
            gh issue comment "$ISSUE_NUMBER" --repo ronisarkarexe/story-spark-ai --body "/assign"

            # Create branch locally
            SAFE_NAME=$(echo "$FILE" | sed 's/[^a-zA-Z0-9-]/_/g')
            BRANCH_NAME="test/add-coverage-$SAFE_NAME"
            echo "Creating local branch: $BRANCH_NAME"
            git checkout -b "$BRANCH_NAME"

            # Generate initial tests
            echo "Generating tests..."
            npx tsx scripts/generate-tests.ts "$FILE"

            # Run verify and repair loop (up to 3 attempts)
            echo "Running verification and repair loop..."
            if npx tsx scripts/verify-and-repair.ts "$FILE"; then
              echo "Verification succeeded! Committing and pushing..."
              
              git add .
              git commit -m "test: add unit tests for $(basename "$FILE")"
              
              # Push branch to our fork
              git push origin "$BRANCH_NAME" --force

              # Construct structured PR body matching pull_request_template.md
              PR_BODY=$(cat <<EOF
## What this PR does

This PR adds unit test coverage for the file \`$FILE\`.
The tests cover core behavior, success flows, and error paths.

## Type of change

- [x] Code quality improvement / tests

## Related issue

Closes ronisarkarexe/story-spark-ai#$ISSUE_NUMBER

## Checklist

- [x] I have added screenshots or a recording when they help explain this PR, or noted **N/A** with a one-line reason (N/A - Unit tests only).
- [x] I have filled in the related issue number when there is one.
- [x] I have tested my changes.
- [x] I have done a self-review of the code.
EOF
)

              # Submit PR against upstream main
              echo "Creating Pull Request on upstream repository..."
              gh pr create \
                --repo ronisarkarexe/story-spark-ai \
                --title "test: add unit tests for $(basename "$FILE")" \
                --body "$PR_BODY" \
                --head "Harshithk951:$BRANCH_NAME" \
                --base main
            else
              echo "Verification and self-repair failed for $FILE. Skipping PR creation."
            fi
          done
