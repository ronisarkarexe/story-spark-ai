name: Verify OG Meta Tags

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  check-og-meta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Verify OG/Twitter meta tags on live site
        run: node scripts/verify-og-meta.js https://storysparkai.vercel.app
