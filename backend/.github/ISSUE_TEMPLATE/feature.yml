name: "✨ Feature Request"
description: "Propose a new capability or behavior"
title: "Feat: "
labels: ["Feat", "Needs Triage"]
body:
  - type: checkboxes
    attributes:
      label: "Is there an existing issue for this?"
      description: "Search open and closed issues before filing a new one."
      options:
        - label: "I have searched the existing issues"
          required: true
  - type: textarea
    attributes:
      label: "Describe the feature"
      description: "What should exist, who uses it, and what problem it solves."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Acceptance criteria (optional)"
      description: "What would ‘done’ look like for this feature?"
  - type: textarea
    attributes:
      label: "Screenshots or mockups (if applicable)"
      description: "Sketches, examples from other apps, or flows. Skip if not relevant."
  - type: checkboxes
    attributes:
      label: "Record"
      options:
        - label: "I agree to follow this project's Code of Conduct"
          required: true
        - label: "I want to work on this issue"
