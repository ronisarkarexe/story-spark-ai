server {
    listen 80;
    server_name localhost;

    # Root directory and index file setup
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ─── PHASE 1: CONTENT SECURITY POLICY (REPORT-ONLY MODE) ───
    # This matches all FR requirements. Note the policy string is a single line.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.example.com; connect-src 'self' https://api.example.com wss://api.example.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; report-uri /api/v1/security/csp-report;" always;

    # ─── GLOBAL DEFENSE-IN-DEPTH SECURITY HEADERS ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # HTTP Strict Transport Security (HSTS) - Enabled for secure SSL/TLS contexts
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Main frontend routing block (SPA fallback support)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── FR-13: REVERSE PROXY FOR CSP VIOLATION REPORTING ───
    # Routes incoming browser reporting data directly down to your backend security module
    location = /csp-report {
        proxy_pass http://backend-service/api/v1/security/csp-report;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
    }

    # Error handling overrides
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
