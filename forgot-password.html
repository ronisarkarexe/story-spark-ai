<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | StorySparkAI</title>
    <link href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons/css/all/all.css" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        width: min(480px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.96);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
      }
      h1 {
        margin: 0 0 16px;
        font-size: 2rem;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: #cbd5e1;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
        color: #f8fafc;
      }
      input {
        width: 100%;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 14px 16px;
        background: #15223a;
        color: #f8fafc;
        font-size: 1rem;
        margin-bottom: 16px;
      }
      button {
        width: 100%;
        padding: 14px 16px;
        border: none;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .help-text {
        margin-top: 16px;
        color: #94a3b8;
        font-size: 0.95rem;
      }
      .link {
        color: #7dd3fc;
        text-decoration: none;
      }
      .message {
        margin: 12px 0 0;
        font-size: 0.95rem;
      }
      .message.success {
        color: #86efac;
      }
      .message.error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Forgot Password</h1>
      <p>Enter your email address below and we'll send a password reset link.</p>
      <form id="forgot-password-form">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        <button type="submit">Send reset link</button>
      </form>
      <p class="message" id="status"></p>
      <p class="help-text">
        Return to <a class="link" href="login.html">login page</a>
      </p>
    </div>
    <script>
      const form = document.getElementById('forgot-password-form');
      const status = document.getElementById('status');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        if (!email) {
          status.textContent = 'Please enter your email address.';
          status.className = 'message error';
          return;
        }

        status.textContent = 'Sending reset link...';
        status.className = 'message';

        try {
          const response = await fetch('/api/v1/auth/forgot-password', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email }),
          });

          if (!response.ok) {
            const body = await response.json().catch(() => null);
            const message = body?.message || 'Unable to send reset link. Please try again.';
            status.textContent = message;
            status.className = 'message error';
            return;
          }

          status.textContent = 'Check your email for the reset instructions.';
          status.className = 'message success';
        } catch (error) {
          status.textContent = 'Network error. Please try again later.';
          status.className = 'message error';
        }
      });
    </script>
  </body>
</html>
